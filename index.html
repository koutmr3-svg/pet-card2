<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Lattemaru | Ultra 3D Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        /* --- 1. 全体設定：iPhone Chromeのメニューバーを計算に入れた中央寄せ --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            /* iPhoneのメニューバーを除いた「本当の高さ」のど真ん中に固定する魔法の単位 */
            height: 100dvh; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;

            /* 背景：動くグラデーション（康さんの設定を完全維持） */
           background: linear-gradient(-45deg, 
                #5d4037, /* 1. 深いモカブラウン（ラテまるくんの毛色の影） */
                #a1887f, /* 2. 温かみのあるグレージュ（ラテまるくんの毛色のハイライト） */
                #efebe9, /* 3. 明るいアイボリー（チェック柄のベース色） */
                #d7ccc8, /* 4. ミルクティーベージュ */
                #8d6e63  /* 5. ココアブラウン */
            );
            background-size: 300% 300%; /* アニメーションの移動距離を少し大きく(300%)して変化を強調 */
            animation: gradientBG 12s ease infinite; /* 速度を少し速め(12s)にして、変化を感じやすく調整 */

            font-family: 'Arial Black', sans-serif;
            color: white;
            text-align: center;
        }

        /* 全ての要素を包み、ど真ん中に配置するためのメインコンテナ */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            /* 画面端に寄りすぎないよう少し余裕を持たせる */
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 2. ネオンタイトル --- */
        h1 {
            /* 読み込んだ筆記体フォントを適用 */
            font-family: 'Dancing Script', cursive;
    
            font-size: clamp(3rem, 12vw, 5rem); /* 筆記体は少し大きめが格好いい！ */
            margin-bottom: 3vh;
            text-transform: capitalize; /* 最初の文字だけ大文字にする（Lattemaru） */
    
            /* ネオンの輝きを、ブラウン背景に合うゴールド系に調整 */
            text-shadow: 0 0 10px #fff, 0 0 20px #d4af37, 0 0 30px #aa8805;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* --- 3. 3Dカードの箱（サイズを画面に最適化） --- */
        .card-container {
            width: 250px;
            height: 380px;
            perspective: 1200px;
            margin-bottom: 5vh;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: spinCard 7s linear infinite;
        }

        @keyframes spinCard {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* --- 4. カードの表裏 --- */
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* ★ここが重要！画像の上に「光のレイヤー」を重ねる魔法 */
        .face::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            /* 鋭い白い光の筋を作るグラデーション */
            background: linear-gradient(
                120deg, 
                rgba(255,255,255,0) 30%, 
                rgba(255,255,255,0.7) 50%, 
                rgba(255,255,255,0) 70%
            );
            transform: rotate(25deg);
            /* 4秒ごとにキラリと光が走るアニメーション */
            animation: sweep 4s infinite;
        }

        @keyframes sweep {
    0% { transform: translateX(-100%) rotate(25deg); }
    100% { transform: translateX(100%) rotate(25deg); }
        }

        .front { transform: rotateY(0deg); }
        .back { transform: rotateY(180deg); }

        .face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ボタンを横に並べるための入れ物 */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }

        .btn-common {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 140px;
            height: 50px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s;
            animation: pulse 1.5s infinite;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .insta-btn {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .tiktok-btn {
            background: #000;
            border: 2px solid #ff0050;
            box-shadow: 2px 2px 0px #00f2ea;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @media screen and (max-width: 480px) {
            h1 {
                /* 10vw から 18vw まで一気に拡大！ */
                font-size: 18vw !important; 
                margin-bottom: 1vh; /* カードとの隙間を少し詰めて画面内の密度を上げます */
                line-height: 1.2;
                white-space: nowrap;
                /* 文字のネオンを少し太くして、カメラ越しでもハッキリ見えるようにします */
                text-shadow: 0 0 10px #fff, 0 0 20px #d4af37, 0 0 40px #aa8805;
            }
    
            /* カードも少しだけ大きくして、余白を埋めます */
            .card-container {
                width: 260px;
                height: 395px;
                margin-bottom: 3vh;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>Lattemaru</h1>

        <div class="card-container">
            <div class="card">
                <div class="face front">
                    <img src="somepicture.png" alt="FRONT">
                </div>
                <div class="face back">
                    <img src="info.png" alt="BACK">
                </div>
            </div>
        </div>

        <div class="btn-group">
            <a href="https://www.instagram.com/lattemaru_0423" class="btn-common insta-btn">Instagram</a>
            <a href="https://www.tiktok.com/@koutmr3" class="btn-common tiktok-btn">TikTok</a>
        </div>
    </div>

</body>
</html>
